# Caico Cotton Image Pipeline Config
api:
  key_env_var: GOOGLE_GENAI_API_KEY    # Set this in your terminal: export GOOGLE_GENAI_API_KEY="your-key"
  model: gemini-3-pro-image-preview     # Nano Banana Pro
  fallback_model: gemini-3.1-flash-image-preview  # Nano Banana 2 (cheaper, faster)
  max_retries: 3
  retry_delay_seconds: 5
  rate_limit_rpm: 10

generation:
  image_size: "4K"
  variants_per_scene: 2                 # How many images per product+reference combo

paths:
  products_dir: images/products
  references_dir: images/references
  outputs_dir: images/outputs
  products_config: products.yaml
  references_config: references.yaml
  templates_dir: prompt_templates

review:
  pause_for_approval: true              # Pause after each product for review

brand:
  name: Caico Cotton
  tagline: "100% Organic Egyptian Cotton"
  style_keywords:
    - soft natural lighting
    - warm neutral tones
    - editorial baby photography
    - organic textures
    - premium minimalist aesthetic
    - shallow depth of field
